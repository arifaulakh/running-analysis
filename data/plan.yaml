      sunday:    {date: 2026-07-12, type: rest,                                        notes: "NO ACTIVITY (Jul 9-14 blackout). Was medium-long 14 km; dropped — fitness is banked (26 km Jul 4); the 6-day gap is a forced mini-taper before the Jul 15-19 re-sharpen."}

