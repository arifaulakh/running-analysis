# Hal Higdon Intermediate 2 — Half Marathon
# 14 calendar weeks: Higdon Weeks 1-11 anchored to 2026-04-20, calendar
# weeks 12-13 are extended taper / buffer, calendar week 14 is the
# actual race week using Higdon's Week 12 schedule.
#
# Training started Mon 2026-04-20 (Higdon Week 1 Mon).
# Race day: Sun 2026-07-26 (SF Marathon Second Half, 8:30 AM, Crissy Field).
#
# Today (2026-05-10, Sun) is calendar Week 3 Sunday = Higdon Week 3 Sunday
# = 5K race day per the plan.
#
# Distances are km (per proc_006). Source plan is Higdon mileage,
# converted at 1 mi = 1.609 km and rounded to 1 decimal.
#
# Source: https://www.halhigdon.com/training-programs/half-marathon-training/intermediate-2-half-marathon/

race_date: 2026-07-26
race_name: SF Marathon Second Half
plan: hal-higdon-intermediate-2

# Phase mapping — by calendar week
phases:
  base:      [1, 2, 3, 4]
  build:     [5, 6, 7, 8]
  peak:      [9, 10, 11]
  taper:     [12, 13]
  race_week: [14]

