      tuesday:   {date: 2026-04-21, type: easy,     distance_km: 4.8,                  notes: "4.8 km easy"}
      wednesday: {date: 2026-04-22, type: interval, intervals: "5 x 400m at 5K pace",  notes: "5K-pace 400s"}
      thursday:  {date: 2026-04-23, type: easy,     distance_km: 4.8,                  notes: "4.8 km easy"}
      friday:    {date: 2026-04-24, type: rest}
      saturday:  {date: 2026-04-25, type: pace,     distance_km: 4.8,                  notes: "4.8 km pace run"}
